<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="script.css">
    <title>Welcome to Javascript</title>
</head>
<body>
    <div class="contianer">
        <h1 id="heading">Welcome to Javascript</h1>
        <input type="text" id="inputtext" placeholder="Enter new heading text">
        <div class="buttons">
            <button onclick="changeHeading()">Change Heading</button>
            <button onclick="changeBackground()">Change Background</button>
            <button onclick="increaseFont()">Increase Font Size</button>
            <button onclick="toggleParagraph()">Show/hide paragraph</button>
            <button onclick="resetPage()">Reset</button>
        </div>
        <p id="paragraph">This is a simple paragraph.Javascript events can dynamically change content.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
